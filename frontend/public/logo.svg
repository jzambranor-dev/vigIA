  <!-- Iris -->
  <circle cx="60" cy="58" r="12" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <!-- Pupila -->
  <circle cx="60" cy="58" r="5" fill="#e94560"/>
  <!-- Brillo del ojo -->
  <circle cx="56" cy="55" r="2" fill="#fff" opacity="0.8"/>
  <!-- Lineas de escaneo (efecto digital) -->
  <line x1="32" y1="48" x2="42" y2="48" stroke="#e94560" stroke-width="1" opacity="0.5"/>
  <line x1="78" y1="48" x2="88" y2="48" stroke="#e94560" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="68" x2="42" y2="68" stroke="#e94560" stroke-width="1" opacity="0.5"/>
  <line x1="78" y1="68" x2="88" y2="68" stroke="#e94560" stroke-width="1" opacity="0.5"/>
  <!-- Ondas de vigilancia -->
  <path d="M35 42 Q48 36 60 42 Q72 48 85 42" fill="none" stroke="#e94560" stroke-width="0.8" opacity="0.3"/>
  <path d="M35 74 Q48 80 60 74 Q72 68 85 74" fill="none" stroke="#e94560" stroke-width="0.8" opacity="0.3"/>
  <!-- Texto vig -->
  <text x="38" y="96" font-family="monospace" font-weight="bold" font-size="14" fill="#ffffff" letter-spacing="1">vig</text>
  <!-- Texto IA -->
  <text x="72" y="96" font-family="monospace" font-weight="bold" font-size="14" fill="#e94560" letter-spacing="1">IA</text>
